<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#8a2be2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mídia & Jovens">
    <title>Mídia & Jovens PV</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 50%, #4a0080 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(186, 85, 211, 0.3);
            box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.3);
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #ba55d3, #9370db, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            text-shadow: 0 0 30px rgba(186, 85, 211, 0.5);
        }

        .header .subtitle {
            font-size: 1.2em;
            color: #d8b4e2;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .controls input,
        .controls select {
            flex: 1;
            min-width: 150px;
            padding: 12px 16px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(186, 85, 211, 0.4);
            border-radius: 12px;
            color: white;
            backdrop-filter: blur(10px);
            font-size: 1em;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6a1b9a, #8e24aa);
        }

        .controls input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .controls input:focus,
        .controls select:focus {
            outline: none;
            border-color: #ba55d3;
            box-shadow: 0 0 20px rgba(186, 85, 211, 0.4);
        }

        .controls select option {
            background: #2d0052;
            color: white;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8a2be2, #9370db);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(138, 43, 226, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-share {
            width: 100%;
            margin-top: 20px;
            background: linear-gradient(135deg, #ba55d3, #da70d6);
            font-size: 1.1em;
            padding: 15px;
        }

        .schedule-card {
            background: rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(186, 85, 211, 0.3);
            box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.3);
        }

        #captureArea {
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 50%, #4a0080 100%);
            padding: 30px;
            border-radius: 20px;
        }

        .schedule-title {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(186, 85, 211, 0.3);
        }

        .schedule-title h2 {
            font-size: 1.5em;
            color: #e6d5f0;
            margin-bottom: 5px;
        }

        .schedule-title .month {
            font-size: 1.3em;
            color: #ba55d3;
        }

        .event-item {
            background: rgba(186, 85, 211, 0.15);
            border-left: 4px solid;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .event-item:hover {
            transform: translateX(5px);
            background: rgba(186, 85, 211, 0.25);
        }

        .event-item.tipo-culto {
            border-left-color: #00ff88;
        }

        .event-item.tipo-santa-ceia {
            border-left-color: #ffeb3b;
        }

        .event-item.tipo-evento {
            border-left-color: #00bfff;
        }

        .event-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .event-icon {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .event-date {
            font-weight: 700;
            font-size: 1.1em;
            color: #e6d5f0;
        }

        .event-title {
            font-weight: 600;
            color: #d8b4e2;
            margin-bottom: 8px;
        }

        .event-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-left: 20px;
        }

        .event-detail-line {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #c9a8d8;
            font-size: 0.95em;
        }

        .event-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(186, 85, 211, 0.2);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: linear-gradient(135deg, #4a90e2, #5ca9fb);
            color: white;
        }

        .btn-delete {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-small:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .members-section {
            background: rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(186, 85, 211, 0.3);
        }

        .members-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .member-tag {
            background: rgba(186, 85, 211, 0.3);
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e6d5f0;
            font-size: 0.95em;
        }

        .member-remove {
            background: rgba(231, 76, 60, 0.8);
            border: none;
            color: white;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.7em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .member-remove:hover {
            background: #e74c3c;
            transform: scale(1.1);
        }

        .add-member-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .add-member-form input {
            flex: 1;
            padding: 10px 15px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(186, 85, 211, 0.4);
            border-radius: 10px;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 100%);
            padding: 30px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(186, 85, 211, 0.4);
            box-shadow: 0 10px 50px rgba(138, 43, 226, 0.5);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(186, 85, 211, 0.4);
            border-radius: 12px;
            color: #d8b4e2;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .tab.active {
            background: linear-gradient(135deg, #8a2be2, #9370db);
            color: white;
            border-color: #ba55d3;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .notice-item {
            background: rgba(186, 85, 211, 0.15);
            border-left: 4px solid #ba55d3;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .notice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .notice-title {
            font-weight: 700;
            color: #e6d5f0;
            font-size: 1.1em;
        }

        .notice-date {
            font-size: 0.85em;
            color: #c9a8d8;
        }

        .notice-text {
            color: #d8b4e2;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .notice-actions {
            display: flex;
            gap: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(186, 85, 211, 0.2);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid rgba(186, 85, 211, 0.3);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d8b4e2;
            font-size: 0.9em;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .add-event-form {
            background: rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(186, 85, 211, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #d8b4e2;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(186, 85, 211, 0.4);
            border-radius: 10px;
            color: white;
            font-size: 1em;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #d8b4e2;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛪ MÍDIA & JOVENS</h1>
            <div class="subtitle">Agenda de Eventos</div>
        </div>

        <div class="controls">
            <input type="month" id="monthInput" placeholder="Mês">
            <button class="btn" onclick="toggleForm()">➕ Evento</button>
            <button class="btn btn-secondary" onclick="toggleMembers()">👥 Membros</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('events')">📅 Eventos</div>
            <div class="tab" onclick="switchTab('notices')">📢 Avisos</div>
        </div>

        <div class="members-section" id="membersSection" style="display: none;">
            <h3 style="margin-bottom: 10px; color: #ba55d3;">Gerenciar Membros</h3>
            
            <div class="members-list" id="membersList"></div>
            
            <div class="add-member-form">
                <input type="text" id="newMemberName" placeholder="Nome do novo membro">
                <button class="btn" onclick="addMember()">Adicionar</button>
            </div>
        </div>

        <!-- Tab de Eventos -->
        <div class="tab-content active" id="eventsTab">
            <div class="add-event-form" id="eventForm" style="display: none;">
                <h3 style="margin-bottom: 15px; color: #ba55d3;">Novo Evento</h3>
                
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="eventDate">
                </div>

                <div class="form-group">
                    <label>Tipo de Evento</label>
                    <select id="eventType">
                        <option value="culto">🟢 Culto</option>
                        <option value="santa-ceia">🟡 Santa Ceia</option>
                        <option value="evento">🔵 Evento Especial</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nome do Evento</label>
                    <input type="text" id="eventName" placeholder="Ex: Culto de Jovens">
                </div>

                <div class="form-group">
                    <label>Responsável Mídia/Cartaz</label>
                    <select id="eventMedia">
                        <option value="Ryan">Ryan</option>
                        <option value="Rayane">Rayane</option>
                        <option value="Milcah">Milcah</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Responsável Editar/Postar</label>
                    <select id="eventPost">
                        <option value="Ryan">Ryan</option>
                        <option value="Rayane">Rayane</option>
                        <option value="Milcah">Milcah</option>
                    </select>
                </div>

                <button class="btn" onclick="addEvent()" style="width: 100%;">Adicionar</button>
            </div>

            <div id="captureArea">
                <div class="schedule-card">
                    <div class="schedule-title">
                        <h2>⛪ MÍDIA PV</h2>
                        <div class="month" id="displayMonth">📅 Março 2026</div>
                    </div>

                    <div id="eventsList"></div>

                    <div class="legend">
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #00ff88;"></div>
                            <span>Domingo</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #ffeb3b;"></div>
                            <span>Santa Ceia</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-dot" style="background: #00bfff;"></div>
                            <span>Evento</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab de Avisos -->
        <div class="tab-content" id="noticesTab">
            <div class="add-event-form" id="noticeForm" style="display: none;">
                <h3 style="margin-bottom: 15px; color: #ba55d3;">Novo Aviso</h3>
                
                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="noticeTitle" placeholder="Ex: Reunião de Mídia">
                </div>

                <div class="form-group">
                    <label>Mensagem</label>
                    <textarea id="noticeText" rows="4" style="width: 100%; padding: 12px; background: rgba(138, 43, 226, 0.2); border: 1px solid rgba(186, 85, 211, 0.4); border-radius: 10px; color: white; font-size: 1em; font-family: inherit; resize: vertical;" placeholder="Digite o comunicado aqui..."></textarea>
                </div>

                <button class="btn" onclick="addNotice()" style="width: 100%;">Publicar Aviso</button>
            </div>

            <div id="captureAreaNotices">
                <div class="schedule-card">
                    <div class="schedule-title">
                        <h2>📢 COMUNICADOS</h2>
                        <div class="month">Mídia & Jovens PV</div>
                    </div>

                    <div id="noticesList"></div>
                </div>
            </div>
        </div>

        <button class="btn btn-share" onclick="shareAsImage()" id="shareBtn">📸 Compartilhar como Imagem</button>
    </div>

    <!-- Modal de Edição -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px; color: #ba55d3;">Editar Evento</h3>
            
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="editEventDate">
            </div>

            <div class="form-group">
                <label>Tipo de Evento</label>
                <select id="editEventType">
                    <option value="culto">🟢 Culto</option>
                    <option value="santa-ceia">🟡 Santa Ceia</option>
                    <option value="evento">🔵 Evento Especial</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nome do Evento</label>
                <input type="text" id="editEventName" placeholder="Ex: Culto de Jovens">
            </div>

            <div class="form-group">
                <label>Responsável Mídia/Cartaz</label>
                <select id="editEventMedia"></select>
            </div>

            <div class="form-group">
                <label>Responsável Editar/Postar</label>
                <select id="editEventPost"></select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" onclick="saveEdit()" style="flex: 1;">Salvar</button>
                <button class="btn btn-secondary" onclick="closeEditModal()" style="flex: 1;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let events = [];
        let notices = [];
        let members = ['Ryan', 'Rayane', 'Milcah'];
        let editingIndex = -1;
        let currentTab = 'events';
        const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
        const mesesAno = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                         'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

        // Carregar dados salvos
        if (localStorage.getItem('events')) {
            events = JSON.parse(localStorage.getItem('events'));
        }
        if (localStorage.getItem('notices')) {
            notices = JSON.parse(localStorage.getItem('notices'));
        }
        if (localStorage.getItem('members')) {
            members = JSON.parse(localStorage.getItem('members'));
        }

        // Registrar Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }

        // Definir mês atual
        const today = new Date();
        document.getElementById('monthInput').value = today.toISOString().slice(0, 7);

        function switchTab(tab) {
            currentTab = tab;
            
            // Atualizar tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            event.target.classList.add('active');
            
            if (tab === 'events') {
                document.getElementById('eventsTab').classList.add('active');
                document.getElementById('shareBtn').textContent = '📸 Compartilhar Eventos';
            } else {
                document.getElementById('noticesTab').classList.add('active');
                document.getElementById('shareBtn').textContent = '📸 Compartilhar Avisos';
                renderNotices();
            }
        }

        function toggleForm() {
            const form = currentTab === 'events' ? 
                document.getElementById('eventForm') : 
                document.getElementById('noticeForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
            if (form.style.display === 'block' && currentTab === 'events') {
                updateMemberSelects();
            }
        }

        function toggleMembers() {
            const section = document.getElementById('membersSection');
            section.style.display = section.style.display === 'none' ? 'block' : 'none';
            if (section.style.display === 'block') {
                renderMembers();
            }
        }

        function renderMembers() {
            const list = document.getElementById('membersList');
            list.innerHTML = members.map((member, index) => `
                <div class="member-tag">
                    ${member}
                    <button class="member-remove" onclick="removeMember(${index})">×</button>
                </div>
            `).join('');
        }

        function addMember() {
            const name = document.getElementById('newMemberName').value.trim();
            if (!name) {
                alert('Digite o nome do membro!');
                return;
            }
            if (members.includes(name)) {
                alert('Esse membro já existe!');
                return;
            }
            members.push(name);
            localStorage.setItem('members', JSON.stringify(members));
            document.getElementById('newMemberName').value = '';
            renderMembers();
            updateMemberSelects();
        }

        function removeMember(index) {
            if (confirm(`Remover ${members[index]}?`)) {
                members.splice(index, 1);
                localStorage.setItem('members', JSON.stringify(members));
                renderMembers();
                updateMemberSelects();
            }
        }

        function updateMemberSelects() {
            const selects = ['eventMedia', 'eventPost', 'editEventMedia', 'editEventPost'];
            selects.forEach(selectId => {
                const select = document.getElementById(selectId);
                const currentValue = select.value;
                select.innerHTML = members.map(m => `<option value="${m}">${m}</option>`).join('');
                if (members.includes(currentValue)) {
                    select.value = currentValue;
                }
            });
        }

        // Funções de Avisos
        function addNotice() {
            const title = document.getElementById('noticeTitle').value.trim();
            const text = document.getElementById('noticeText').value.trim();

            if (!title || !text) {
                alert('Preencha título e mensagem!');
                return;
            }

            notices.unshift({
                id: Date.now(),
                title: title,
                text: text,
                date: new Date().toISOString()
            });

            localStorage.setItem('notices', JSON.stringify(notices));

            document.getElementById('noticeTitle').value = '';
            document.getElementById('noticeText').value = '';
            toggleForm();
            renderNotices();
        }

        function deleteNotice(id) {
            if (!confirm('Excluir este aviso?')) return;

            notices = notices.filter(n => n.id !== id);
            localStorage.setItem('notices', JSON.stringify(notices));
            renderNotices();
        }

        function renderNotices() {
            const noticesList = document.getElementById('noticesList');
            
            if (notices.length === 0) {
                noticesList.innerHTML = '<div class="empty-state">Nenhum aviso cadastrado</div>';
                return;
            }

            noticesList.innerHTML = notices.map(notice => {
                const date = new Date(notice.date);
                const dateStr = `${date.getDate().toString().padStart(2, '0')}/${(date.getMonth() + 1).toString().padStart(2, '0')}/${date.getFullYear()}`;
                
                return `
                    <div class="notice-item">
                        <div class="notice-header">
                            <div class="notice-title">${notice.title}</div>
                            <div class="notice-date">${dateStr}</div>
                        </div>
                        <div class="notice-text">${notice.text}</div>
                        <div class="notice-actions">
                            <button class="btn-small btn-delete" onclick="deleteNotice(${notice.id})">🗑️ Excluir</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Funções de Eventos
        function addEvent() {
            const date = document.getElementById('eventDate').value;
            const type = document.getElementById('eventType').value;
            const name = document.getElementById('eventName').value;
            const media = document.getElementById('eventMedia').value;
            const post = document.getElementById('eventPost').value;

            if (!date || !name) {
                alert('Preencha data e nome do evento!');
                return;
            }

            events.push({
                date: date,
                type: type,
                name: name,
                media: media,
                post: post
            });

            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('events', JSON.stringify(events));

            document.getElementById('eventDate').value = '';
            document.getElementById('eventName').value = '';
            toggleForm();
            
            renderEvents();
        }

        function editEvent(index) {
            const selectedMonth = document.getElementById('monthInput').value;
            const filteredEvents = events.filter(e => e.date.startsWith(selectedMonth));
            const event = filteredEvents[index];
            
            editingIndex = events.findIndex(e => 
                e.date === event.date && 
                e.name === event.name && 
                e.media === event.media
            );

            updateMemberSelects();
            
            document.getElementById('editEventDate').value = event.date;
            document.getElementById('editEventType').value = event.type;
            document.getElementById('editEventName').value = event.name;
            document.getElementById('editEventMedia').value = event.media;
            document.getElementById('editEventPost').value = event.post;

            document.getElementById('editModal').classList.add('active');
        }

        function saveEdit() {
            if (editingIndex === -1) return;

            events[editingIndex] = {
                date: document.getElementById('editEventDate').value,
                type: document.getElementById('editEventType').value,
                name: document.getElementById('editEventName').value,
                media: document.getElementById('editEventMedia').value,
                post: document.getElementById('editEventPost').value
            };

            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('events', JSON.stringify(events));
            closeEditModal();
            renderEvents();
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
            editingIndex = -1;
        }

        function deleteEvent(index) {
            if (!confirm('Excluir este evento?')) return;

            const selectedMonth = document.getElementById('monthInput').value;
            const filteredEvents = events.filter(e => e.date.startsWith(selectedMonth));
            const event = filteredEvents[index];
            
            const realIndex = events.findIndex(e => 
                e.date === event.date && 
                e.name === event.name && 
                e.media === event.media
            );

            events.splice(realIndex, 1);
            localStorage.setItem('events', JSON.stringify(events));
            renderEvents();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T12:00:00');
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const dayWeek = diasSemana[date.getDay()];
            
            return `${day}/${month} (${dayWeek})`;
        }

        function getEventIcon(type) {
            if (type === 'culto') return '🟢';
            if (type === 'santa-ceia') return '🟡';
            return '🔵';
        }

        function renderEvents() {
            const selectedMonth = document.getElementById('monthInput').value;
            const [year, month] = selectedMonth.split('-');
            
            const monthName = mesesAno[parseInt(month) - 1];
            document.getElementById('displayMonth').textContent = `📅 ${monthName} ${year}`;

            const filteredEvents = events.filter(e => e.date.startsWith(selectedMonth));

            const eventsList = document.getElementById('eventsList');
            
            if (filteredEvents.length === 0) {
                eventsList.innerHTML = '<div class="empty-state">Nenhum evento cadastrado neste mês</div>';
                return;
            }

            eventsList.innerHTML = filteredEvents.map((event, index) => `
                <div class="event-item tipo-${event.type}">
                    <div class="event-header">
                        <div class="event-icon" style="background: ${
                            event.type === 'culto' ? '#00ff88' : 
                            event.type === 'santa-ceia' ? '#ffeb3b' : '#00bfff'
                        };"></div>
                        <div class="event-date">${getEventIcon(event.type)} ${formatDate(event.date)} — ${event.name}</div>
                    </div>
                    <div class="event-details">
                        <div class="event-detail-line">
                            📸 Mídia/Cartaz: ${event.media}
                        </div>
                        <div class="event-detail-line">
                            📱 Editar/Postar: ${event.post}
                        </div>
                    </div>
                    <div class="event-actions">
                        <button class="btn-small btn-edit" onclick="editEvent(${index})">✏️ Editar</button>
                        <button class="btn-small btn-delete" onclick="deleteEvent(${index})">🗑️ Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        async function shareAsImage() {
            const captureArea = currentTab === 'events' ? 
                document.getElementById('captureArea') : 
                document.getElementById('captureAreaNotices');
            
            const actionButtons = captureArea.querySelectorAll('.event-actions, .notice-actions');
            actionButtons.forEach(btn => btn.style.display = 'none');
            
            try {
                const canvas = await html2canvas(captureArea, {
                    backgroundColor: '#1a0033',
                    scale: 2.5,
                    logging: false,
                    width: captureArea.offsetWidth,
                    height: captureArea.offsetHeight,
                    windowWidth: captureArea.offsetWidth,
                    windowHeight: captureArea.offsetHeight
                });

                actionButtons.forEach(btn => btn.style.display = 'flex');

                canvas.toBlob(async (blob) => {
                    const fileName = currentTab === 'events' ? 
                        'agenda-midia-jovens.png' : 
                        'avisos-midia-jovens.png';
                    const file = new File([blob], fileName, { type: 'image/png' });
                    
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: currentTab === 'events' ? 'Agenda Mídia & Jovens' : 'Avisos Mídia & Jovens',
                                text: 'Confira!'
                            });
                        } catch (err) {
                            if (err.name !== 'AbortError') {
                                downloadImage(canvas, fileName);
                            }
                        }
                    } else {
                        downloadImage(canvas, fileName);
                    }
                }, 'image/png', 1.0);
            } catch (error) {
                actionButtons.forEach(btn => btn.style.display = 'flex');
                alert('Erro ao gerar imagem. Tente novamente!');
            }
        }

        function downloadImage(canvas, fileName) {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }

        // Event listeners
        document.getElementById('monthInput').addEventListener('change', renderEvents);

        document.getElementById('editModal').addEventListener('click', (e) => {
            if (e.target.id === 'editModal') {
                closeEditModal();
            }
        });

        // Inicializar
        updateMemberSelects();
        renderEvents();
        renderNotices();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídia & Jovens PV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 50%, #4a0080 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px 20px;
            background: rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(186, 85, 211, 0.3);
            box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.3);
        }

        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #ba55d3, #9370db, #8a2be2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            text-shadow: 0 0 30px rgba(186, 85, 211, 0.5);
        }

        .header .subtitle {
            font-size: 1.2em;
            color: #d8b4e2;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .controls input,
        .controls select {
            flex: 1;
            min-width: 150px;
            padding: 12px 16px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(186, 85, 211, 0.4);
            border-radius: 12px;
            color: white;
            backdrop-filter: blur(10px);
            font-size: 1em;
        }

        .controls input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .controls input:focus,
        .controls select:focus {
            outline: none;
            border-color: #ba55d3;
            box-shadow: 0 0 20px rgba(186, 85, 211, 0.4);
        }

        .controls select option {
            background: #2d0052;
            color: white;
        }

        .btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #8a2be2, #9370db);
            border: none;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(138, 43, 226, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-share {
            width: 100%;
            margin-top: 20px;
            background: linear-gradient(135deg, #ba55d3, #da70d6);
            font-size: 1.1em;
            padding: 15px;
        }

        .schedule-card {
            background: rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(186, 85, 211, 0.3);
            box-shadow: 0 8px 32px 0 rgba(138, 43, 226, 0.3);
        }

        #captureArea {
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 50%, #4a0080 100%);
            padding: 30px;
            border-radius: 20px;
        }

        .schedule-title {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(186, 85, 211, 0.3);
        }

        .schedule-title h2 {
            font-size: 1.5em;
            color: #e6d5f0;
            margin-bottom: 5px;
        }

        .schedule-title .month {
            font-size: 1.3em;
            color: #ba55d3;
        }

        .event-item {
            background: rgba(186, 85, 211, 0.15);
            border-left: 4px solid;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .event-item:hover {
            transform: translateX(5px);
            background: rgba(186, 85, 211, 0.25);
        }

        .event-item.tipo-culto {
            border-left-color: #00ff88;
        }

        .event-item.tipo-santa-ceia {
            border-left-color: #ffeb3b;
        }

        .event-item.tipo-evento {
            border-left-color: #00bfff;
        }

        .event-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .event-icon {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .event-date {
            font-weight: 700;
            font-size: 1.1em;
            color: #e6d5f0;
        }

        .event-title {
            font-weight: 600;
            color: #d8b4e2;
            margin-bottom: 8px;
        }

        .event-details {
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding-left: 20px;
        }

        .event-detail-line {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #c9a8d8;
            font-size: 0.95em;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid rgba(186, 85, 211, 0.3);
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #d8b4e2;
            font-size: 0.9em;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .add-event-form {
            background: rgba(138, 43, 226, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(186, 85, 211, 0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #d8b4e2;
            font-weight: 600;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(138, 43, 226, 0.2);
            border: 1px solid rgba(186, 85, 211, 0.4);
            border-radius: 10px;
            color: white;
            font-size: 1em;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #d8b4e2;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⛪ MÍDIA & JOVENS</h1>
            <div class="subtitle">Agenda de Eventos</div>
        </div>

        <div class="controls">
            <input type="month" id="monthInput" placeholder="Mês">
            <button class="btn" onclick="toggleForm()">➕ Adicionar Evento</button>
        </div>

        <div class="add-event-form" id="eventForm" style="display: none;">
            <h3 style="margin-bottom: 15px; color: #ba55d3;">Novo Evento</h3>
            
            <div class="form-group">
                <label>Data</label>
                <input type="date" id="eventDate">
            </div>

            <div class="form-group">
                <label>Tipo de Evento</label>
                <select id="eventType">
                    <option value="culto">🟢 Culto</option>
                    <option value="santa-ceia">🟡 Santa Ceia</option>
                    <option value="evento">🔵 Evento Especial</option>
                </select>
            </div>

            <div class="form-group">
                <label>Nome do Evento</label>
                <input type="text" id="eventName" placeholder="Ex: Culto de Jovens">
            </div>

            <div class="form-group">
                <label>Responsável Mídia/Cartaz</label>
                <select id="eventMedia">
                    <option value="Ryan">Ryan</option>
                    <option value="Rayane">Rayane</option>
                    <option value="Milcah">Milcah</option>
                </select>
            </div>

            <div class="form-group">
                <label>Responsável Editar/Postar</label>
                <select id="eventPost">
                    <option value="Ryan">Ryan</option>
                    <option value="Rayane">Rayane</option>
                    <option value="Milcah">Milcah</option>
                </select>
            </div>

            <button class="btn" onclick="addEvent()" style="width: 100%;">Adicionar</button>
        </div>

        <div id="captureArea">
            <div class="schedule-card">
                <div class="schedule-title">
                    <h2>⛪ MÍDIA PV</h2>
                    <div class="month" id="displayMonth">📅 Março 2026</div>
                </div>

                <div id="eventsList"></div>

                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-dot" style="background: #00ff88;"></div>
                        <span>Domingo</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background: #ffeb3b;"></div>
                        <span>Santa Ceia</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-dot" style="background: #00bfff;"></div>
                        <span>Evento</span>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn btn-share" onclick="shareAsImage()">📸 Compartilhar como Imagem</button>
    </div>

    <script>
        let events = [];
        const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
        const mesesAno = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 
                         'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];

        // Carregar eventos salvos
        if (localStorage.getItem('events')) {
            events = JSON.parse(localStorage.getItem('events'));
        }

        // Definir mês atual
        const today = new Date();
        document.getElementById('monthInput').value = today.toISOString().slice(0, 7);

        function toggleForm() {
            const form = document.getElementById('eventForm');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function addEvent() {
            const date = document.getElementById('eventDate').value;
            const type = document.getElementById('eventType').value;
            const name = document.getElementById('eventName').value;
            const media = document.getElementById('eventMedia').value;
            const post = document.getElementById('eventPost').value;

            if (!date || !name) {
                alert('Preencha data e nome do evento!');
                return;
            }

            events.push({
                date: date,
                type: type,
                name: name,
                media: media,
                post: post
            });

            events.sort((a, b) => new Date(a.date) - new Date(b.date));
            localStorage.setItem('events', JSON.stringify(events));

            // Limpar form
            document.getElementById('eventDate').value = '';
            document.getElementById('eventName').value = '';
            toggleForm();
            
            renderEvents();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T12:00:00');
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const dayWeek = diasSemana[date.getDay()];
            
            return `${day}/${month} (${dayWeek})`;
        }

        function getEventIcon(type) {
            if (type === 'culto') return '🟢';
            if (type === 'santa-ceia') return '🟡';
            return '🔵';
        }

        function renderEvents() {
            const selectedMonth = document.getElementById('monthInput').value;
            const [year, month] = selectedMonth.split('-');
            
            // Atualizar título do mês
            const monthName = mesesAno[parseInt(month) - 1];
            document.getElementById('displayMonth').textContent = `📅 ${monthName} ${year}`;

            const filteredEvents = events.filter(e => e.date.startsWith(selectedMonth));

            const eventsList = document.getElementById('eventsList');
            
            if (filteredEvents.length === 0) {
                eventsList.innerHTML = '<div class="empty-state">Nenhum evento cadastrado neste mês</div>';
                return;
            }

            eventsList.innerHTML = filteredEvents.map((event, index) => `
                <div class="event-item tipo-${event.type}">
                    <div class="event-header">
                        <div class="event-icon" style="background: ${
                            event.type === 'culto' ? '#00ff88' : 
                            event.type === 'santa-ceia' ? '#ffeb3b' : '#00bfff'
                        };"></div>
                        <div class="event-date">${getEventIcon(event.type)} ${formatDate(event.date)} — ${event.name}</div>
                    </div>
                    <div class="event-details">
                        <div class="event-detail-line">
                            📸 Mídia/Cartaz: ${event.media}
                        </div>
                        <div class="event-detail-line">
                            📱 Editar/Postar: ${event.post}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function shareAsImage() {
            const captureArea = document.getElementById('captureArea');
            
            try {
                const canvas = await html2canvas(captureArea, {
                    backgroundColor: '#1a0033',
                    scale: 2,
                    logging: false
                });

                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'agenda-midia-jovens.png', { type: 'image/png' });
                    
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        try {
                            await navigator.share({
                                files: [file],
                                title: 'Agenda Mídia & Jovens',
                                text: 'Confira a agenda do mês!'
                            });
                        } catch (err) {
                            downloadImage(canvas);
                        }
                    } else {
                        downloadImage(canvas);
                    }
                });
            } catch (error) {
                alert('Erro ao gerar imagem. Tente novamente!');
            }
        }

        function downloadImage(canvas) {
            const link = document.createElement('a');
            link.download = 'agenda-midia-jovens.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        // Event listeners
        document.getElementById('monthInput').addEventListener('change', renderEvents);

        // Carregar eventos iniciais
        renderEvents();
    </script>
</body>
</html>
